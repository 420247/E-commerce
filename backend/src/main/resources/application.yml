spring:
  application:
    name: ecommerce-backend

  datasource:
    # PostgreSQL connection — credentials loaded from environment variables (never hardcode passwords)
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate  # validate: Hibernate checks DB schema matches entities, but never modifies it
                          # other options: create, create-drop, update (dangerous in production)
    show-sql: true        # logs every SQL query to console — useful for debugging, disable in production
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect # tells Hibernate to generate PostgreSQL-specific SQL
        format_sql: true  # pretty-prints SQL in logs — easier to read

  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: false
    validate-on-migrate: false  # skip checksum validation — allows editing migration files

# Custom JWT configuration — read by JwtService via @Value annotations
application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 # HEX-encoded HMAC-SHA256 key — replace in production via env variable
      expiration: 900000         # access token lifetime: 15 minutes (900000 ms)
      refresh-expiration: 604800000 # refresh token lifetime: 7 days (604800000 ms)

server:
  port: 8080 # backend runs on port 8080, Angular dev server runs on 4200
  