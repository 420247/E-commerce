server {
    listen 80;

    # The directory where our compiled Angular app lives.
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────────────────
    # Angular Router support (HTML5 History API)
    #
    # Angular is a Single Page Application — there is only one real file:
    # index.html. All other "pages" like /products or /products/5 are handled
    # by JavaScript inside the browser, not by separate HTML files.
    #
    # Problem: when a user refreshes the browser on /products/5, nginx looks
    # for a file called "products/5" on disk, finds nothing, and returns 404.
    #
    # Solution: try_files tells nginx to:
    #   1. Look for an exact file match ($uri)
    #   2. Look for a directory match ($uri/)
    #   3. Fall back to index.html — let Angular Router handle the URL
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # API proxy — forward /api/* requests to the backend container
    #
    # The Angular app makes requests to /api/products, /api/auth/login, etc.
    # Without this proxy, those requests would go to the nginx container
    # (port 80) instead of the backend container (port 8080).
    #
    # proxy_pass forwards matching requests to the backend service.
    # In Docker Compose, "backend" resolves to the backend container's IP
    # via Docker's internal DNS — no hardcoded IPs needed.
    #
    # The proxy headers pass the original client information to the backend:
    #   Host            — original hostname from the browser request
    #   X-Real-IP       — the actual client IP address
    #   X-Forwarded-For — list of all proxies the request passed through
    # ─────────────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
}
