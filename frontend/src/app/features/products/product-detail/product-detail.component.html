@if (isLoading) {
  <div class="loading-container">
    <mat-spinner />
  </div>
} @else if (product) {
  <div class="detail-container">
    <a mat-button routerLink="/products" class="back-btn">
      <mat-icon>arrow_back</mat-icon> Back to products
    </a>

    <div class="detail-layout">
      <div class="image-section">
        <img
          [src]="product.imageUrl"
          [alt]="product.name"
          class="product-image"
          onerror="this.src = 'https://placehold.co/600x400'"
        />
      </div>

      <div class="info-section">
        <mat-chip-set>
          <mat-chip>{{ product.category }}</mat-chip>
        </mat-chip-set>

        <h1 class="product-title">{{ product.name }}</h1>

        <div class="rating-row">
          <mat-icon class="star-icon">star</mat-icon>
          <span class="rating-value">{{ product.rating }}</span>
          <span class="rating-label">/ 5.0</span>
        </div>

        <p class="product-price">€{{ product.price | number: '1.2-2' }}</p>

        <p class="product-description">{{ product.description }}</p>

        <p class="stock-info">
          <mat-icon>inventory_2</mat-icon>
          {{ product.stock > 0 ? product.stock + ' in stock' : 'Out of stock' }}
        </p>

        <div class="action-buttons">
          <button mat-raised-button color="primary" [disabled]="product.stock === 0">
            <mat-icon>shopping_cart</mat-icon>
            Add to cart
          </button>

          <button
            mat-stroked-button
            [color]="wishlistService.isInWishlist(product.id) ? 'warn' : 'primary'"
            (click)="toggleWishlist()"
          >
            <mat-icon>
              {{ wishlistService.isInWishlist(product.id) ? 'favorite' : 'favorite_border' }}
            </mat-icon>
            {{
              wishlistService.isInWishlist(product.id) ? 'Remove from wishlist' : 'Save to wishlist'
            }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
